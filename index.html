<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zeta Client Loader</title>
</head>
<body>
  <script>
    async function loadAndRun() {
      const urls = [
        "https://cdn.jsdelivr.net/gh/larpinguser/fixed-games@main/eagler-clients/zeta/clZetaClient.html.part1",
        "https://cdn.jsdelivr.net/gh/larpinguser/fixed-games@main/eagler-clients/zeta/clZetaClient.html.part2"
      ];

      let fullHtml = "";
      for (const u of urls) {
        const res = await fetch(u);
        fullHtml += await res.text();
      }

    
      document.open();         
      document.write(fullHtml); 
      document.close();
    }

    loadAndRun();
  </script>
</body>
</html>
